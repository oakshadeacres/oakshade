<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oakshade Acres Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div>
        <h1>Oakshade Acres Admin</h1>
        <p>Edit the site content, then click Deploy</p>
      </div>
      <div class="header-actions">
        <span id="save-indicator" class="save-indicator"></span>
        <button id="deploy-btn" class="btn btn-deploy" onclick="deployChanges()" title="Deploy to GitHub Pages">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 16 12 12 8 16"></polyline>
            <line x1="12" y1="12" x2="12" y2="21"></line>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
          </svg>
          <span>Deploy</span>
        </button>
        <button id="followup-btn" class="followup-bell hidden" onclick="toggleFollowupPanel()" title="Unanswered questions">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span id="followup-count" class="followup-badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <nav class="tab-bar">
    <div class="tab-bar-inner" id="tab-bar"></div>
  </nav>

  <main class="container">
    <div id="tab-panel"></div>
  </main>

  <div id="followup-modal" class="modal hidden">
    <div class="modal-content followup-panel">
      <div class="followup-panel-header">
        <h3>Unanswered Questions</h3>
        <button class="btn btn-back" onclick="closeFollowupPanel()">&times;</button>
      </div>
      <div id="followup-list" class="followup-list">
        <div class="empty-state">No unanswered questions</div>
      </div>
    </div>
  </div>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-body">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeConfirmModal()">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
